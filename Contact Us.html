<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<title>تماس با ما</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
    margin:0;
    font-family:sans-serif;
    background-image: url(42a2a21b-7c71-4da8-9cb2-2ae298172048.png);
}

/* هدر */
header{
    background-color:#8B4513;
    padding:10px 20px;
    display:flex;
    align-items:center;
}

.logo img{
    width:50px;
}

/* منو */
nav ul{
    display:flex;
    list-style:none;
    margin:0;
    padding:0;
    gap:20px;
}

nav a{
    color:white;
    text-decoration:none;
    padding:6px 10px;
    border-radius:5px;
    transition:0.3s;
}

nav a:hover{
    background-color:rgb(186, 147, 73);
}

/* دکمه‌های سمت چپ */
.header1{
    margin-right:auto;
    display:flex;
    gap:10px;
}

/* دکمه اصلی */
.btn{
    color:white;
    text-decoration:none;
    padding:10px 20px;
    border-radius:8px;
    font-weight:bold;
    background:#5a2d0c;
    display:inline-block;
    transition:0.3s;
}

/* هاور درست و یکپارچه */
.btn:hover{
    background-color:rgb(186, 147, 73);
    transform:translateY(-5px) scale(1.05);
}

/* باکس اصلی */
.contact-container{
    max-width:900px;
    margin:50px auto;
    background: #ffffff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,0.1);
}

/* عنوان */
.contact-container h2{
    text-align:center;
    margin-bottom:20px;
    color:#8B4513;
}

/* فرم */
form{
    display:flex;
    flex-direction:column;
    gap:15px;
}

input, textarea{
    padding:12px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
    outline:none;
    transition:0.3s;
}

input:focus, textarea:focus{
    border-color:#8B4513;
}

/* دکمه */
button{
    padding:12px;
    background:#8B4513;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    background:#b07a3a;
    transform:scale(1.03);
}

/* اطلاعات تماس */
.info{
    margin-top:30px;
    padding-top:20px;
    border-top:1px solid #eee;
    text-align:center;
    line-height:2;
}
/*رسپانسیو */
@media (max-width:768px){

header{
    flex-direction:column;
    align-items:center;
    gap:10px;
    text-align:center;
}

nav ul{
    flex-direction:column;
    align-items:center;
    gap:8px;
}

.header1{
    margin-right:0;
    justify-content:center;
    flex-direction:column;
}

.btn{
    width:150px;
    text-align:center;
}

}

</style>
</head>

<body>


<header >
    <div class="logo">
        <img src="imageslogo.png">
    </div>

    <nav class="nav">
        <ul>
            <li><a href="index.html">خانه</a></li>
            <li><a href="maghale.html">مقالات</a></li>
            <li><a href="about.html">درباره ما</a></li>
            <li><a href="Contact Us.html">تماس با ما</a></li>
        </ul>
    </nav>
</header>

<section class="contact-container">

    <h2>با ما در ارتباط باشید</h2>

    <form>
        <input type="text" placeholder="نام و نام خانوادگی" required>
        <input type="email" placeholder="ایمیل" required>
        <input style="text-align: right;" type="tel" placeholder="شماره تماس" required>
        <input type="text" placeholder="موضوع پیام">
        <textarea rows="6" placeholder="متن پیام..." required></textarea>
        <button type="submit">ارسال پیام</button>
    </form>

    <div class="info">
        📞 تلفن: 09233849809<br>
        📍 آدرس: ایران، بم<br>
        📧 ایمیل: info@zarrindates.com
    </div>

</section>

</body>
</html>
