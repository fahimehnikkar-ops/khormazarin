<html lang="fa" dir="rtl">

<head>
    <title>ورود به حساب کاربری</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
        }

        .login-page {
            height: 100vh;
            background-image: url(imagesdate1.png);
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* باکس لاگین */
       .login-box{
    background: rgba(0,0,0,0.55);
    padding:35px;
    border-radius:18px;
    text-align:center;
    width:90%;
    max-width:320px;
    animation: fadeIn 1s ease;
            /* انیمیشن ورود */
            animation: fadeIn 1s ease;
        }

        /* عنوان */
        .login-box h2 {
            color: white;
            margin-bottom: 10px;
        }

        .login-box p {
            color: #ddd;
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* input */
        .login-box input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            outline: none;
            margin-bottom: 15px;
            box-sizing:border-box;
        }

        /* دکمه */
        .login-box button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #00c853;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        /* هاور دکمه */
        .login-box button:hover {
            background: #00a844;
            transform: scale(1.05);
        }

        /* انیمیشن */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* رسپانسیو موبایل */
@media (max-width: 600px){

    .login-page{
        padding:20px;
        box-sizing:border-box;
    }

    .login-box{
        width:100%;
        max-width:320px;
        padding:25px;
    }

    .login-box h2{
        font-size:22px;
    }

    .login-box input,
    .login-box button{
        box-sizing:border-box;
    }
}
    </style>
</head>

<body>

<section class="login-page">
    <div class="login-box">
        <h2>ورود به حساب کاربری</h2>
        <p>شماره موبایل خود را وارد کنید</p>

        <input type="tel" placeholder="09xxxxxxxxx">
        <button>ورود</button>
    </div>
</section>

</body>

</html>
